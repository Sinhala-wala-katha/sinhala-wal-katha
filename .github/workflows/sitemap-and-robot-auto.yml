name: sitemap-and-robot-auto (static)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Google Verification ෆයිල් එක තාවකාලිකව හංගනවා (Rename කරනවා)
      - name: Hide Google Verification File
        run: |
          if [ -f "googlee91a7f05558ef324.html" ]; then
            mv googlee91a7f05558ef324.html google_verify_temp.html
          fi

      # 2. සයිට්මැප් එක සෑදීම (දැන් අර ෆයිල් එක පේන්න නැති නිසා සිතියමට එන්නේ නැහැ)
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://sinhala-wala-katha.github.io/
          include-pdf: false

      # 3. හංගපු ෆයිල් එක ආපහු මුල් නමටම හරවනවා (Verify එක නැති වෙන්නේ නැති වෙන්න)
      - name: Restore Google Verification File
        run: |
          if [ -f "google_verify_temp.html" ]; then
            mv google_verify_temp.html googlee91a7f05558ef324.html
          fi

      # 4. Robots.txt එක සෑදීම
      - name: Create Robots.txt
        run: |
          cat <<EOF > robots.txt
          User-agent: *
          Allow: /
          Disallow: /404.html

          Sitemap: https://sinhala-wala-katha.github.io/sitemap.xml
          EOF

      # 5. සියල්ල Commit කර Push කිරීම
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml robots.txt
          git commit -m "SEO: Fixed Clean Sitemap and Robots.txt [skip ci]" || exit 0
          git push
